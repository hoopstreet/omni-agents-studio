name: Real-Time Security Scanning & Monitoring

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch:

jobs:
  security-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      # ============================================
      # 1. DEPENDENCY SCANNING
      # ============================================
      
      - name: Run npm audit
        run: |
          npm audit --audit-level=moderate || true
          
      - name: Run pnpm audit
        run: |
          pnpm audit || true
          
      - name: Snyk Security Scan
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high
        continue-on-error: true

      # ============================================
      # 2. CODE SCANNING
      # ============================================
      
      - name: CodeQL Analysis
        uses: github/codeql-action/init@v2
        with:
          languages: 'javascript,typescript'
          
      - name: Autobuild
        uses: github/codeql-action/autobuild@v2
        
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v2

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        continue-on-error: true

      # ============================================
      # 3. SECRET SCANNING
      # ============================================
      
      - name: TruffleHog Secret Scanning
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --debug --only-verified
        continue-on-error: true

      - name: Detect Secrets
        uses: Yelp/detect-secrets-action@v1
        with:
          baseline: .secrets.baseline
        continue-on-error: true

      # ============================================
      # 4. CONTAINER SCANNING
      # ============================================
      
      - name: Build Docker image
        run: |
          docker build -t omni-agents:latest . || true
          
      - name: Trivy Vulnerability Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'omni-agents:latest'
          format: 'sarif'
          output: 'trivy-results.sarif'
        continue-on-error: true
        
      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results.sarif'
        continue-on-error: true

      # ============================================
      # 5. INFRASTRUCTURE SCANNING
      # ============================================
      
      - name: Checkov Infrastructure Scan
        uses: bridgecrewio/checkov-action@master
        with:
          directory: .
          framework: all
          quiet: false
          soft_fail: true
        continue-on-error: true

      # ============================================
      # 6. LICENSE COMPLIANCE
      # ============================================
      
      - name: License Compliance Check
        run: |
          npm install -g license-checker
          license-checker --json > licenses.json || true
          
      - name: FOSSA License Scan
        uses: fossas/fossa-action@main
        with:
          api-key: ${{ secrets.FOSSA_API_KEY }}
        continue-on-error: true

      # ============================================
      # 7. PERFORMANCE SCANNING
      # ============================================
      
      - name: Lighthouse CI
        uses: treosh/lighthouse-ci-action@v9
        with:
          uploadArtifacts: true
          temporaryPublicStorage: true
        continue-on-error: true

      # ============================================
      # 8. MALWARE SCANNING
      # ============================================
      
      - name: ClamAV Malware Scan
        run: |
          sudo apt-get update
          sudo apt-get install -y clamav clamav-daemon
          sudo freshclam
          sudo clamscan -r --heuristic-scan-option=Plus . --log=clamscan.log || true
          cat clamscan.log
          
      - name: Upload scan results
        uses: actions/upload-artifact@v3
        with:
          name: security-scan-results
          path: |
            clamscan.log
            licenses.json
            trivy-results.sarif
        continue-on-error: true

      # ============================================
      # 9. NOTIFICATION
      # ============================================
      
      - name: Slack Notification
        if: failure()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: 'Security scan failed'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
          fields: repo,message,commit,author
        continue-on-error: true

  database-scan:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Database Security Scan
        run: |
          # Install pgaudit
          sudo apt-get update
          sudo apt-get install -y postgresql-contrib
          
          # Run database checks
          psql -h localhost -U postgres -d postgres << EOF
          CREATE EXTENSION IF NOT EXISTS pgaudit;
          SELECT * FROM pg_stat_statements WHERE mean_time > 1000;
          SELECT schemaname, tablename, rowsecurity FROM pg_tables WHERE rowsecurity = false;
          EOF
        continue-on-error: true

  api-scan:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: pnpm install

      - name: API Security Testing
        run: |
          # Test API endpoints for vulnerabilities
          pnpm test:api || true

      - name: OWASP ZAP Scan
        uses: zaproxy/action-full-scan@v0
        with:
          target: 'http://localhost:3000'
          rules_file_name: '.zap/rules.tsv'
          cmd_options: '-a'
        continue-on-error: true

  compliance-check:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: GDPR Compliance Check
        run: |
          echo "Checking GDPR compliance..."
          # Check for data retention policies
          grep -r "retention" . --include="*.ts" --include="*.js" || true
          
      - name: HIPAA Compliance Check
        run: |
          echo "Checking HIPAA compliance..."
          # Check for encryption
          grep -r "encrypt\|AES\|TLS" . --include="*.ts" --include="*.js" || true
          
      - name: SOC2 Compliance Check
        run: |
          echo "Checking SOC2 compliance..."
          # Check for audit logs
          grep -r "audit\|log" . --include="*.ts" --include="*.js" || true
